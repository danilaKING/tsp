version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockinterview
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Переопределяем DATABASE_URL — внутри Docker хост БД = имя сервиса "db"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mockinterview
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Адрес бэкенда, который видит БРАУЗЕР пользователя (не Docker-сеть)
        VITE_API_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
